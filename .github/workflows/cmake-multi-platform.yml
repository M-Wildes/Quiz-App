name: CMake (Windows & macOS)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            c_compiler: cl
            cpp_compiler: cl
            qt_host: windows
            qt_arch: win64_msvc2019_64
            platform: windows

          - os: macos-latest
            c_compiler: clang
            cpp_compiler: clang++
            qt_host: mac
            qt_arch: clang_64
            platform: macos

    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.6.1'
          host: ${{ matrix.qt_host }}
          arch: ${{ matrix.qt_arch }}
          target: desktop
          cache: true

      - name: Configure CMake
        shell: bash
        run: |
          cmake -B build -S . \
            -DCMAKE_C_COMPILER=${{ matrix.c_compiler }} \
            -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }}

      - name: Build
        shell: bash
        run: cmake --build build --config Release

      - name: Package
        shell: bash
        run: |
          mkdir -p dist

          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            EXE=$(find build -name "QuizApp.exe" | head -n 1)
            cp "$EXE" dist/
            windeployqt dist/QuizApp.exe

          elif [[ "${{ matrix.os }}" == "macos-latest" ]]; then
            APP=$(find build -name "QuizApp.app" | head -n 1)
            cp -R "$APP" dist/
          fi

      - name: Create zip (IMPORTANT FIX)
        shell: bash
        run: |
          if [[ "${{ matrix.platform }}" == "windows" ]]; then
            cd dist
            zip -r ../QuizApp-windows.zip .
          fi

          if [[ "${{ matrix.platform }}" == "macos" ]]; then
            # ZIP FROM PARENT DIR so .app stays intact
            cd dist
            zip -r ../QuizApp-macos.zip QuizApp.app
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: QuizApp-${{ matrix.platform }}
          path: QuizApp-${{ matrix.platform }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: QuizApp Build ${{ github.run_number }}
          files: release/**/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}