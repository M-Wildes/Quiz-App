name: CMake (Windows & macOS)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            c_compiler: cl
            cpp_compiler: cl
            build_type: Release
            qt_host: windows
            qt_arch: win64_msvc2019_64

          - os: macos-latest
            c_compiler: clang
            cpp_compiler: clang++
            build_type: Release
            qt_host: mac
            qt_arch: clang_64

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.6.1'
          host: ${{ matrix.qt_host }}
          arch: ${{ matrix.qt_arch }}
          target: desktop
          cache: true

      - name: Set build directory
        id: vars
        shell: bash
        run: echo "build_dir=${{ github.workspace }}/build" >> "$GITHUB_OUTPUT"

      - name: Configure CMake
        run: >
          cmake -B ${{ steps.vars.outputs.build_dir }}
          -S ${{ github.workspace }}
          -DCMAKE_C_COMPILER=${{ matrix.c_compiler }}
          -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }}
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}

      - name: Build
        run: cmake --build ${{ steps.vars.outputs.build_dir }} --config ${{ matrix.build_type }}

      - name: Test
        working-directory: ${{ steps.vars.outputs.build_dir }}
        run: ctest --build-config ${{ matrix.build_type }}

      - name: Package build
        run: |
          mkdir -p dist

          # Windows binary
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp build/bin/QuizApp.exe dist/
          fi

          # macOS app bundle
          if [ "${{ matrix.os }}" = "macos-latest" ]; then
            cp -R build/bin/QuizApp.app dist/
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: QuizApp-${{ matrix.os }}
          path: dist/

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: QuizApp Build ${{ github.run_number }}
          files: release/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}