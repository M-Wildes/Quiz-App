name: CMake (windows & mac)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            c_compiler: cl
            cpp_compiler: cl
            build_type: Release

          - os: mac-latest
            c_compiler: clang
            cpp_compiler: clang++
            build_type: Release

    steps:
      - uses: actions/checkout@v4

      # Install Qt (this is the part you were missing)
      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.5.0'
          host: ${{ runner.os }}
          target: desktop
          modules: qtbase

      - name: Set build directory
        id: vars
        run: echo "build_dir=${{ github.workspace }}/build" >> $GITHUB_OUTPUT

      - name: Configure CMake
        run: >
          cmake -B ${{ steps.vars.outputs.build_dir }}
          -S ${{ github.workspace }}
          -DCMAKE_PREFIX_PATH=${{ env.Qt6_DIR }}
          -DCMAKE_C_COMPILER=${{ matrix.c_compiler }}
          -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }}
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}

      - name: Build
        run: cmake --build ${{ steps.vars.outputs.build_dir }} --config ${{ matrix.build_type }}

      - name: Test
        working-directory: ${{ steps.vars.outputs.build_dir }}
        run: ctest --build-config ${{ matrix.build_type }}