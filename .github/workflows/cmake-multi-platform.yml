name: CMake (Windows & macOS)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

# REQUIRED or GitHub will block release creation
permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            c_compiler: cl
            cpp_compiler: cl
            qt_host: windows
            qt_arch: win64_msvc2019_64

          - os: macos-latest
            c_compiler: clang
            cpp_compiler: clang++
            qt_host: mac
            qt_arch: clang_64

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.6.1'
          host: ${{ matrix.qt_host }}
          arch: ${{ matrix.qt_arch }}
          target: desktop
          cache: true

      - name: Configure CMake
        shell: bash
        run: |
          cmake -B build \
                -S . \
                -DCMAKE_C_COMPILER=${{ matrix.c_compiler }} \
                -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }}

      - name: Build
        shell: bash
        run: cmake --build build --config Release

      - name: Package build
        shell: bash
        run: |
          mkdir -p dist

          EXE_PATH=$(find build -type f -name "QuizApp.exe" | head -n 1)
          APP_PATH=$(find build -type d -name "QuizApp.app" | head -n 1)

          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            cp "$EXE_PATH" dist/
          fi

          if [[ "${{ matrix.os }}" == "macos-latest" ]]; then
            cp -R "$APP_PATH" dist/
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: QuizApp-${{ matrix.os }}
          path: dist/

  release:
    needs: build
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: QuizApp Build ${{ github.run_number }}
          files: release/**/*